<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelVibe AI — Creative AI Studio</title>
  <meta name="description"
    content="PixelVibe AI is a creative studio crafting stunning AI-generated images, art, and video for brands that want to stand out." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet" />
  <link rel="icon" href="assets/logoPixel2.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="home">

  <!-- ─── NAVIGATION ─── -->
  <div id="nav-placeholder"></div>
  <script src="assets/nav.js"></script>

  <!-- ─── HERO with video carousel ─── -->
  <section id="hero">
    <div class="hero-carousel" id="heroCarousel">
      <div class="hc-slide active" data-index="0">
        <video muted playsinline>
          <source src="assets/v4.mp4" type="video/mp4">
        </video>
      </div>
      <div class="hc-slide" data-index="1">
        <video muted playsinline>
          <source src="assets/v2.mp4" type="video/mp4">
        </video>
      </div>
      <div class="hc-slide" data-index="2">
        <video muted playsinline>
          <source src="assets/v3.mp4" type="video/mp4">
        </video>
      </div>
      <div class="hc-slide" data-index="3">
        <video muted playsinline>
          <source src="assets/hero-bg.mp4" type="video/mp4">
        </video>
      </div>
    </div>

    <!-- ─── LIGHTBOX ─── -->
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-eyebrow">
        <span class="dot"></span>
        <div>
          High-end AI visuals and cinematic content
        </div>
      </div>
      <div class="hero-actions" style="gap: 60px">
        <a href="portfolio.html" class="btn-ghost-white">Inspire Me</a>
        <a href="contact.html" class="btn-primary">Contact Us →</a>
      </div>
    </div>

  </section>


  <!-- ─── LIGHTBOX ─── -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <img id="lightboxImg" src="" alt="" />
  </div>

  <script src="assets/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      /* ─── HERO CAROUSEL ─── */
      const heroSlides = document.querySelectorAll('.hc-slide');
      let heroIdx = 0;

      function goHeroSlide(idx) {
        if (!heroSlides.length) return;

        // Pause current video
        const oldVid = heroSlides[heroIdx].querySelector('video');
        if (oldVid) oldVid.pause();
        heroSlides[heroIdx].classList.remove('active');

        // Target next index
        heroIdx = (idx + heroSlides.length) % heroSlides.length;

        // Transition to next slide
        heroSlides[heroIdx].classList.add('active');

        // Play new video
        const newVid = heroSlides[heroIdx].querySelector('video');
        if (newVid) {
          newVid.currentTime = 0;
          newVid.play().catch(err => console.log("Video play blocked:", err));
        }
      }

      // Initialize: Add 'ended' event listener to all videos
      heroSlides.forEach((slide, i) => {
        const video = slide.querySelector('video');
        if (video) {
          video.addEventListener('ended', () => {
            // Only advance if this was the active video
            if (slide.classList.contains('active')) {
              goHeroSlide(heroIdx + 1);
            }
          });
        }
      });

      // Start the first video
      const firstVid = heroSlides[0]?.querySelector('video');
      if (firstVid) {
        firstVid.play().catch(() => {
          // If browser blocks initial play, clicking anywhere on the document will start it
          const startOnInteraction = () => {
            firstVid.play();
            document.removeEventListener('click', startOnInteraction);
          };
          document.addEventListener('click', startOnInteraction);
        });
      }

      /* ─── SCROLL RELYING ON NAV INJECTION ─── */
      const checkElements = setInterval(() => {
        const siteHeader = document.querySelector('.site-header');
        const logoWrap = document.querySelector('.logo-wrap');

        if (siteHeader && logoWrap) {
          clearInterval(checkElements);

          window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const heroHeight = window.innerHeight;

            const logoOpacity = Math.max(0, 1 - scrollY / 300);
            const logoScale = Math.max(0.9, 1 - scrollY / 1000);

            logoWrap.style.opacity = logoOpacity;
            logoWrap.style.transform = `scale(${logoScale})`;
            logoWrap.style.pointerEvents = logoOpacity < 0.1 ? 'none' : 'auto';

            if (scrollY > heroHeight - 100) {
              siteHeader.classList.add('scrolled');
            } else {
              siteHeader.classList.remove('scrolled');
            }
          });
        }
      }, 100);
    });
  </script>

</body>

</html>
